<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Exemplo de Formulário com JavaScript</title>
    <script src="script.js" defer></script>
</head>
<body>
    <div>
    <h1>Calculadora de Quadrado</h1>
    <form id="numeroForm">
        <label for="numero">Digite um número:</label>
        <input type="number" id="numero" name="numero" required>
        <button type="submit">Calcular Quadrado</button>
    </form>

        <label for="opcao">Escolha o calque que deseja fazer:</label>

    <select name="x" id="opcao">
        <option value="Quadrado">Quadrado</option>
        <option value="Cubo">Cubo</option>
    </select>

    <p>O Quadrado é: <span id="resultado"></span></p>
    <p>O Cubo é: <span id="resultado2"></span></p>
    </div>

</body>
</html>
